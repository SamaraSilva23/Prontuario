<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Prontuários Salvos</title>

  <!-- ÍCONES -->
  <link 
    rel="stylesheet" 
    href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="ProntStyle.css">

</head>

<body>

  <!-- CONTEÚDO -->
  <main class="content">

    <!-- TOPO -->
    <div class="topbar">

      <h1>Prontuários Salvos</h1>

      <a href="../TelaInicial/Index.html" class="btn-novo-prontuario">

         <i class="fi fi-rr-plus"></i>

         Novo Prontuário

        </a>

    </div>

    <!-- CONTAINER -->
    <div class="prontuarios-container">

      <!-- PESQUISA -->
      <div class="search-box">

        <i class="fi fi-rr-search"></i>

        <input 
          type="text"
          placeholder="Pesquisar paciente..."
        >

      </div>

      <!-- GRID DE CARDS -->
      <div class="prontuarios-grid">

        <!-- CARD -->
        <div class="prontuario-card">

          <h2>Ana Costa</h2>

          <div class="card-info">

            <div class="info-item">
              <i class="fi fi-rr-id-badge"></i>
              <span>ID: #003</span>
            </div>

            <div class="info-item">
              <i class="fi fi-rr-calendar"></i>
              <span>16/05/2026</span>
            </div>

          </div>

          <div class="card-actions">

            <button class="card-btn btn-view">
              Visualizar
            </button>

          </div>

        </div>

      </div>

    </div>

  </main>

</body>
</html>
